# AniHy access control and directory hardening
# Copy this file to /etc/apache2/conf-available/anihy.conf and run:
#   sudo a2enconf anihy
#   sudo systemctl reload apache2

# Never expose internal directories
<Directory /var/www/html/anime/downloader>
    Require all denied
</Directory>

<Directory /var/www/html/anime/inc>
    Require all denied
</Directory>

<Directory /var/www/html/anime/logs>
    Require all denied
</Directory>

<Directory /var/www/html/anime/worker>
    Require all denied
</Directory>

<Directory /var/www/html/anime/sql>
    Require all denied
</Directory>

# Gate all /anime/ requests behind the access cookie
<Directory /var/www/html/anime>
    RewriteEngine On

    # Allow the auth gate itself
    RewriteCond %{REQUEST_URI} ^/anime/auth_gate\.php$ [NC]
    RewriteRule ^ - [L]

    # Allow static assets so the gate and login UI can render
    RewriteCond %{REQUEST_URI} ^/anime/assets/ [NC]
    RewriteRule ^ - [L]

    # If the access cookie is not present, store the original URI in a
    # short-lived redirect cookie and send the user to the auth gate.
    # Empty domain field lets the browser use the current host.
    RewriteCond %{HTTP_COOKIE} !anihy_access=[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89ab][a-f0-9]{3}-[a-f0-9]{12}\.[a-f0-9]{64} [NC]
    RewriteRule ^ - [CO=anihy_redirect:%{REQUEST_URI}?%{QUERY_STRING}:%{HTTP_HOST}:0:/anime/,E=REDIRECT_TO_GATE:1]

    RewriteCond %{ENV:REDIRECT_TO_GATE} =1
    RewriteRule ^(.*)$ /anime/auth_gate.php? [R=302,L]
</Directory>
